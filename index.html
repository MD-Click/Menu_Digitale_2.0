<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PWA Master Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link id="dynamic-font" rel="stylesheet">
    <style>
        :root { --accent: #ffcc00; --bg: #ffffff; --text: #000; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; transition: 0.5s; }
        #loader { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .spinner { width: 50px; height: 50px; border: 5px solid #eee; border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        header { text-align: center; padding: 30px; }
        .cat-title { background: var(--accent); padding: 12px; font-weight: 900; text-transform: uppercase; position: sticky; top: 0; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: var(--card-bg, #f4f4f4); padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .price { font-weight: bold; color: var(--accent); font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="status-text" style="margin-top:20px; font-weight:bold;">Invocazione Dati...</div>
    <div id="slow-msg" style="display:none; margin-top:10px; color:#666; font-size:0.9rem; text-align:center; padding:20px;"></div>
</div>

<header id="header"></header>
<div id="google_translate_element" style="display:none"></div>
<main id="app"></main>

<script>
const params = new URLSearchParams(window.location.search);
const ID = params.get('id');
const GID_MENU = "595974812"; // <--- ASSICURATI CHE QUESTO SIA IL GID DEL TUO TAB "MENU"

async function start() {
    if(!ID) { document.getElementById('status-text').innerText = "❌ Manca ?id= nell'URL"; return; }
    
    // Timer per rallentamenti
    const slowTimer = setTimeout(() => document.getElementById('slow-msg').style.display = 'block', 3000);

    try {
        // Carica Config (GID 0)
        const config = await loadSheet(ID, 0);
        const cfg = {}; config.forEach(r => cfg[r.Parametro] = r.Valore);
        
        // Messaggio personalizzato
        document.getElementById('slow-msg').innerText = cfg.Loading_Msg || "Quasi pronti...";

        // Carica Menu
        const menu = await loadSheet(ID, GID_MENU);
        
        // Costruisci UI
        applyStyles(cfg);
        render(menu, cfg);
        
        // Fine
        clearTimeout(slowTimer);
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        initTranslate();
    } catch (e) {
        document.getElementById('status-text').innerText = "⚠️ Errore: Verifica Pubblicazione CSV";
    }
}

async function loadSheet(id, gid) {
    const url = `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}&t=${Date.now()}`;
    const res = await fetch(url);
    const text = await res.text();
    return new Promise(resolve => Papa.parse(text, {header:true, complete: r => resolve(r.data)}));
}

function applyStyles(cfg) {
    const r = document.documentElement;
    if(cfg.Font_Main) {
        document.getElementById('dynamic-font').href = `https://fonts.googleapis.com/css2?family=${cfg.Font_Main.replace(/ /g, '+')}&display=swap`;
        document.body.style.fontFamily = cfg.Font_Main;
    }
    r.style.setProperty('--accent', cfg.Filter_Active_Color || '#ffcc00');
    r.style.setProperty('--bg', cfg.App_Bg_Color || '#fff');
    r.style.setProperty('--card-bg', cfg.Card_Bg || '#f4f4f4');
    
    const h = document.getElementById('header');
    h.innerHTML = cfg.Logo_Type === 'TEXT' ? `<h1>${cfg.Logo_Text}</h1>` : `<img src="${cfg.Logo_URL}" style="max-height:80px">`;
}

function render(data, cfg) {
    const app = document.getElementById('app');
    const cats = [...new Set(data.map(i => i.Categoria))].filter(c => c);
    
    cats.forEach(c => {
        const div = document.createElement('div');
        div.innerHTML = `<div class="cat-title">${c}</div>`;
        const grid = document.createElement('div');
        grid.className = cfg.Cat_Layout === 'GRID' ? 'menu-grid' : '';
        
        data.filter(i => i.Categoria === c && i.Attivo === 'SI').forEach(item => {
            grid.innerHTML += `
                <div class="card" style="margin:10px">
                    <div style="font-weight:bold">${item.Nome_IT}</div>
                    <div style="font-size:0.8rem; opacity:0.7">${item.Desc_IT || ''}</div>
                    <div class="price">€${item.Prezzo}</div>
                </div>`;
        });
        div.appendChild(grid);
        app.appendChild(div);
    });
}

function initTranslate() {
    const lang = navigator.language.split('-')[0];
    if (lang === 'it') return;
    window.googleTranslateElementInit = () => {
        new google.translate.TranslateElement({pageLanguage: 'it'}, 'google_translate_element');
        setTimeout(() => {
            const s = document.querySelector('.goog-te-combo');
            if(s) { s.value = lang; s.dispatchEvent(new Event('change')); }
        }, 1000);
    };
    const s = document.createElement('script');
    s.src = "//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
    document.head.appendChild(s);
}

window.onload = start;
</script>
</body>
</html>
