<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Menu Pro - Ultimate Control</title>
    <link id="font-link" rel="stylesheet" href="">
    <style>
        /* SETUP VARIABILI */
        :root {
            --app-bg: #fff; --primary: #000; --card-bg: #fff; --card-shadow: 0 4px 12px rgba(0,0,0,0.05);
            --macro-height: 200px; --macro-text-size: 2rem; --macro-text-color: #fff; --macro-text-weight: 900;
            --filter-bg: #eee; --filter-text: #000; --filter-active: #ffcc00;
        }

        body { margin: 0; background-color: var(--app-bg); font-family: sans-serif; transition: 0.3s; color: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        #loader { position:fixed; inset:0; background:var(--app-bg); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,0,0,0.1); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }

        header { padding: 20px; text-align: center; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .header-bg-solid { background: var(--app-bg); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .container { padding: 10px 20px 80px; max-width: 800px; margin: auto; min-height: 80vh; }

        /* FILTRI RAPIDI */
        .filters-wrapper { display: none; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .filter-btn { padding: 8px 16px; border-radius: 20px; background: var(--filter-bg); color: var(--filter-text); font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap; border: none; transition: 0.2s; }
        .filter-btn.active { background: var(--filter-active); color: #000; transform: scale(1.05); }

        /* MACRO CARD */
        .macro-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .macro-card { position: relative; height: var(--macro-height); border-radius: 18px; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; transition: 0.3s; }
        .macro-card::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.35); }
        .macro-title { position: relative; z-index: 2; color: var(--macro-text-color); font-size: var(--macro-text-size); font-weight: var(--macro-text-weight); text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.4); }

        /* CATEGORIE E PIATTI */
        .layout-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .layout-list { display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--card-bg); border-radius: 15px; box-shadow: var(--card-shadow); padding: 15px; transition: 0.2s; }
        .section-title { font-size: 1.4rem; font-weight: 800; margin: 25px 0 15px; text-transform: uppercase; }
        
        .dish-img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; margin-right: 15px; }
        .dish-info { flex: 1; }
        .dish-name { font-weight: 700; margin: 0; font-size: 1.1rem; }
        .dish-desc { font-size: 0.85rem; color: #666; margin: 4px 0; }
        .dish-price { font-weight: 800; color: var(--primary); margin-top: 5px; }

        .back-btn { display: inline-block; padding: 10px 18px; background: rgba(0,0,0,0.05); border-radius: 25px; cursor: pointer; font-weight: 700; margin-bottom: 15px; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header id="main-header">
    <img id="logo" src="" style="max-height:80px; display:none; margin:0 auto;" onclick="location.reload()">
    <div id="app-subtitle"></div>
</header>

<div class="container">
    <div id="filters-container" class="filters-wrapper">
        <button class="filter-btn" onclick="toggleFilter('senza_glutine', this)">🚫 Senza Glutine</button>
        <button class="filter-btn" onclick="toggleFilter('vegano', this)">🌿 Vegano</button>
        <button class="filter-btn" onclick="toggleFilter('analcolico', this)">🥤 Analcolico</button>
    </div>
    <div id="app-container"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const SHEET_ID = urlParams.get('id');
    let fullMenu = []; let config = {};
    let activeFilters = { senza_glutine: false, vegano: false, analcolico: false };
    let currentView = { macro: null, category: null };

    async function init() {
        if(!SHEET_ID) return;
        const cb = `&_cache=${Date.now()}`;
        try {
            const [cR, mR] = await Promise.all([
                fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Config${cb}`).then(r => r.text()),
                fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Menu${cb}`).then(r => r.text())
            ]);
            config = parseCSV(cR).reduce((acc, r) => ({...acc, [r.Parametro]: r.Valore}), {});
            fullMenu = parseCSV(mR).filter(i => i.Attivo === 'SI');
            applyStyles();
            render();
            document.getElementById('loader').remove();
        } catch(e) { console.error(e); }
    }

    function parseCSV(s) {
        const res = []; let row = []; let col = ''; let iQ = false;
        for (let i = 0; i < s.length; i++) {
            let c = s[i];
            if (c === '"') { iQ = !iQ; }
            else if (c === ',' && !iQ) { row.push(col); col = ''; }
            else if (c === '\n' && !iQ) { row.push(col); res.push(row); row = []; col = ''; }
            else { col += c; }
        }
        res.push(row);
        const h = res[0].map(v => v.trim());
        return res.slice(1).filter(r => r.length > 1).map(r => h.reduce((o, v, i) => ({...o, [v]: r[i]?.trim()}), {}));
    }

    function applyStyles() {
        const r = document.documentElement.style;
        if(config.App_Bg_Type === 'IMAGE') {
            document.body.style.background = `url('${config.App_Bg_Image}') center/cover fixed`;
        } else {
            r.setProperty('--app-bg', config.App_Bg_Color || '#fff');
            document.getElementById('main-header').classList.add('header-bg-solid');
        }
        r.setProperty('--primary', config.Theme_Primary || '#000');
        r.setProperty('--macro-height', config.Macro_Height || '200px');
        r.setProperty('--macro-text-size', config.Macro_Text_Size || '2rem');
        r.setProperty('--filter-bg', config.Filter_BG_Color || '#eee');
        r.setProperty('--filter-active', config.Filter_Active_Color || '#ffcc00');
        
        if(config.Show_Filters === 'SI') document.getElementById('filters-container').style.display = 'flex';
        if(config.Logo_URL) { const l = document.getElementById('logo'); l.src = config.Logo_URL; l.style.display = 'block'; }
        if(config.App_Subtitle) document.getElementById('app-subtitle').innerText = config.App_Subtitle;
    }

    function render() {
        const cont = document.getElementById('app-container');
        cont.innerHTML = '';
        const mode = config.Layout_Mode || 'CATEGORIE';

        if(mode === 'MACRO' && !currentView.macro) {
            renderMacros(cont);
        } else if((mode === 'MACRO' && currentView.macro && !currentView.category) || (mode === 'CATEGORIE' && !currentView.category)) {
            renderCategories(cont);
        } else {
            renderDishes(cont);
        }
    }

    function renderMacros(cont) {
        const macros = [...new Set(fullMenu.map(i => i.Macro).filter(m => m))];
        let html = '<div class="macro-grid fade-in">';
        macros.forEach(m => {
            const img = fullMenu.find(i => i.Macro === m && i.Cat_Foto_URL)?.Cat_Foto_URL || '';
            html += `<div class="macro-card" style="background-image:url('${img}')" onclick="setView('macro', '${m}')"><h2 class="macro-title">${m}</h2></div>`;
        });
        cont.innerHTML = html + '</div>';
    }

    function renderCategories(cont) {
        let items = currentView.macro ? fullMenu.filter(i => i.Macro === currentView.macro) : fullMenu;
        const cats = [...new Set(items.map(i => i.Categoria))];
        let html = currentView.macro ? `<div class="back-btn" onclick="setView('macro', null)">← Indietro</div>` : '';
        html += `<div class="layout-grid fade-in">`;
        cats.forEach(c => {
            const img = items.find(i => i.Categoria === c && i.Cat_Foto_URL)?.Cat_Foto_URL || '';
            html += `<div class="card" onclick="setView('category', '${c}')" style="text-align:center">
                <img src="${img}" style="width:100%; border-radius:10px; margin-bottom:10px">
                <div style="font-weight:800; text-transform:uppercase">${c}</div>
            </div>`;
        });
        cont.innerHTML = html + '</div>';
    }

    function renderDishes(cont) {
        let items = fullMenu.filter(i => i.Categoria === currentView.category);
        
        // APPLICA FILTRI DINAMICI
        if(activeFilters.senza_glutine) items = items.filter(i => i.Senza_Glutine === 'SI');
        if(activeFilters.vegano) items = items.filter(i => i.Vegano === 'SI');
        if(activeFilters.analcolico) items = items.filter(i => i.Analcolico === 'SI');

        let html = `<div class="back-btn" onclick="setView('category', null)">← Indietro</div><div class="layout-list fade-in">`;
        items.forEach(i => {
            html += `<div class="card" style="display:flex; align-items:center">
                ${i.Foto_URL ? `<img src="${i.Foto_URL}" class="dish-img">` : ''}
                <div class="dish-info">
                    <p class="dish-name">${i.Nome_IT || i.Nome_EN}</p>
                    <p class="dish-desc">${i.Desc_IT || i.Desc_EN || ''}</p>
                    <div class="dish-price">${i.Prezzo}€</div>
                </div>
            </div>`;
        });
        cont.innerHTML = html + '</div>';
    }

    window.setView = (type, val) => {
        if(type === 'macro') { currentView.macro = val; currentView.category = null; }
        if(type === 'category') { currentView.category = val; }
        render();
        window.scrollTo(0,0);
    }

    window.toggleFilter = (f, btn) => {
        activeFilters[f] = !activeFilters[f];
        btn.classList.toggle('active');
        render();
    }

    init();
</script>
</body>
</html>
