<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Digitale</title>
    
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="main-header">
        <div id="header-content-wrapper">
            <div id="logo-container"></div>
            <div id="subtitle-container"></div>
            <div id="level-title-inside" class="level-title hidden"></div>
        </div>
    </header>

    <div id="sub-header">
        <h2 id="sub-header-title"></h2>
        <div id="sub-header-filters" class="filter-container"></div>
    </div>

    <button id="back-button" onclick="goBack()" aria-label="Torna indietro">
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>

    <main id="main-content" class="container">
        <div id="loading-screen" class="flex-center-col pt-20">
            <div class="loader mb-4"></div>
            <p id="loading-text">Sincronizzazione...</p>
        </div>

        <div id="level-title-outside" class="level-title hidden mb-4"></div>

        <section id="page-macro" class="hidden"><div id="macro-layout-container" class="page-content"></div></section>
        <section id="page-categories" class="hidden page-content space-y-4"></section>
        <section id="page-items" class="hidden page-content space-y-4"></section>
    </main>

    <script src="app.js"></script>
    <script>
        // Registrazione Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW setup fallito:', err));
            });
        }
    </script>
</body>
</html>
