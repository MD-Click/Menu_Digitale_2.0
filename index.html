<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Menu Pro</title>
    <link id="f-link" rel="stylesheet" href="">
    <style>
        :root { --p: #000; --bg: #f8f9fa; --c-bg: #fff; --m-h: 180px; --m-fs: 2rem; --m-c: #fff; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); min-height: 100vh; color: #333; }
        #bg-layer { position:fixed; inset:0; z-index:-1; background-size:cover; background-position:center; background-repeat: no-repeat; transition: 0.5s; }
        
        #loader { position:fixed; inset:0; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; transition: 0.5s; }
        .spin { width:40px; height:40px; border:4px solid #f3f3f3; border-top:4px solid var(--p); border-radius:50%; animation: s 1s linear infinite; }
        @keyframes s { 100% { transform:rotate(360deg); } }

        header { padding: 30px 20px; text-align:center; position:sticky; top:0; z-index:100; transition: 0.3s; }
        .h-blur { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); box-shadow: 0 4px 30px rgba(0,0,0,0.1); }

        #logo-wrap h1 { margin:0; font-size: var(--l-fs, 2rem); color: var(--l-c, #000); font-weight:900; text-transform:uppercase; letter-spacing:-1px; cursor:pointer; }
        #logo-wrap img { max-height: 80px; display:block; margin:0 auto; cursor:pointer; }
        #subt { font-size: var(--s-fs, 0.95rem); color: var(--s-c, #666); font-weight: 600; margin-top:8px; display:none; }

        .container { padding:15px; max-width:900px; margin:auto; min-height: 60vh; }
        
        /* MACRO */
        .m-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
        .m-list { display:flex; flex-direction:column; gap:15px; }
        .m-card { height:var(--m-h); border-radius:25px; overflow:hidden; position:relative; display:flex; align-items:center; justify-content: center; cursor:pointer; box-shadow: 0 12px 30px rgba(0,0,0,0.2); transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .m-card:active { transform: scale(0.96); }
        .m-card img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }
        .m-ov { position:absolute; inset:0; background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 100%); z-index:2; }
        .m-txt { position:relative; z-index:3; color:var(--m-c); font-size:var(--m-fs); font-weight:900; text-transform:uppercase; text-shadow: 0 3px 15px rgba(0,0,0,0.6); letter-spacing: 1px; }

        /* CATEGORIE */
        .c-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap:15px; }
        .c-card { background: var(--c-bg); border-radius:20px; padding:12px; text-align:center; cursor:pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.06); transition: 0.2s; }
        .c-card:active { transform: translateY(3px); }
        .c-card img { width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:15px; margin-bottom:12px; }
        .c-card b { text-transform:uppercase; font-size:14px; color:#222; font-weight: 800; }

        /* PIATTI */
        .d-card { background: var(--c-bg); border-radius:20px; padding:15px; display:flex; align-items:center; margin-bottom:15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .d-img { width:90px; height:90px; object-fit:cover; border-radius:15px; margin-right:18px; }
        .d-name { font-weight:800; font-size:1.15rem; margin:0; color:#111; }
        .d-desc { font-size:0.9rem; color:#666; margin:5px 0; line-height:1.4; }
        .d-price { font-weight:900; color:var(--p); margin-top:10px; font-size:1.2rem; }

        .nav-back { display:inline-flex; align-items:center; padding:12px 25px; background:rgba(0,0,0,0.08); border-radius:50px; font-weight:800; margin-bottom:25px; cursor:pointer; font-size:14px; color:#000; text-transform: uppercase; }
        .ani { animation: fadeIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        
        #error-box { display:none; padding:20px; background:#ffeeee; border:1px solid #ffcccc; color:#cc0000; border-radius:10px; margin-bottom:20px; font-size:14px; }
    </style>
</head>
<body>

<div id="loader"><div class="spin"></div><p style="margin-top:15px; font-weight:700;">Caricamento Menu...</p></div>
<div id="bg-layer"></div>

<header id="h-main">
    <div id="logo-wrap"></div>
    <div id="subt"></div>
</header>

<div class="container">
    <div id="error-box"></div>
    <div id="view"></div>
</div>

<script>
    const SID = new URLSearchParams(window.location.search).get('id');
    let db = [], cfg = {}, st = { m: null, c: null };

    // Funzione di pulizia chiavi (es: "Senza Glutine" -> "senza_glutine")
    const cl = (s) => s ? s.toString().trim().toLowerCase().replace(/\s+/g, '_') : '';

    async function start() {
        if(!SID) { 
            document.getElementById('error-box').innerHTML = "ERRORE: ID del foglio mancante nell'URL!";
            document.getElementById('error-box').style.display = 'block';
            return; 
        }

        try {
            // SUPER CACHE BUSTER: aggiungiamo timestamp ovunque
            const t = Date.now();
            const configUrl = `https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Config&t=${t}`;
            const menuUrl = `https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Menu&t=${t}`;

            const [resC, resM] = await Promise.all([
                fetch(configUrl, { cache: "no-store" }).then(r => r.text()),
                fetch(menuUrl, { cache: "no-store" }).then(r => r.text())
            ]);

            // Parsing CONFIG
            parse(resC).forEach(r => {
                const key = cl(r.Parametro);
                if(key && !key.startsWith('---')) cfg[key] = r.Valore;
            });

            // Parsing MENU
            db = parse(resM).map(r => {
                let n = {};
                Object.keys(r).forEach(k => n[cl(k)] = r[k]);
                return n;
            }).filter(i => i.attivo === 'SI');

            apply();
            render();
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 500);

        } catch (e) {
            document.getElementById('error-box').innerHTML = "ERRORE CONNESSIONE: Assicurati che il foglio sia 'Pubblicato sul Web'.";
            document.getElementById('error-box').style.display = 'block';
        }
    }

    function parse(text) {
        const rows = []; let f = '', q = false, r = [];
        const cleanText = text.replace(/\r/g, "");
        for (let i = 0; i < cleanText.length; i++) {
            let c = cleanText[i], next = cleanText[i+1];
            if (c === '"' && q && next === '"') { f += '"'; i++; }
            else if (c === '"') q = !q;
            else if (c === ',' && !q) { r.push(f.trim()); f = ''; }
            else if (c === '\n' && !q) { r.push(f.trim()); rows.push(r); r = []; f = ''; }
            else f += c;
        }
        if(f || r.length) { r.push(f.trim()); rows.push(r); }
        const header = rows[0];
        return rows.slice(1).filter(row => row.length > 0).map(row => {
            return header.reduce((obj, key, i) => {
                obj[key] = row[i] || "";
                return obj;
            }, {});
        });
    }

    function apply() {
        const s = document.documentElement.style;
        const bg = document.getElementById('bg-layer');
        const lw = document.getElementById('logo-wrap');
        const stx = document.getElementById('subt');

        // SFONDO
        if(cfg.app_bg_type === 'IMAGE' && cfg.app_bg_image) {
            bg.style.backgroundImage = `url('${cfg.app_bg_image}')`;
            s.setProperty('--bg', 'transparent');
        } else {
            s.setProperty('--bg', cfg.app_bg_color || '#f8f9fa');
            bg.style.backgroundImage = 'none';
        }

        // LOGO / NOME
        if(cfg.logo_type === 'TEXT') {
            lw.innerHTML = `<h1 onclick="home()">${cfg.logo_text || 'MENU'}</h1>`;
            s.setProperty('--l-c', cfg.logo_text_color || '#000');
            s.setProperty('--l-fs', cfg.logo_text_size || '2rem');
        } else if(cfg.logo_url) {
            lw.innerHTML = `<img src="${cfg.logo_url}" onclick="home()">`;
        }

        // SOTTOTITOLO
        if(cfg.show_subtitle === 'SI' && cfg.app_subtitle) {
            stx.innerText = cfg.app_subtitle;
            stx.style.display = 'block';
            s.setProperty('--s-c', cfg.subtitle_color || '#666');
        }

        // STILI CARD E MACRO
        s.setProperty('--p', cfg.theme_primary || '#000');
        s.setProperty('--c-bg', cfg.card_bg || '#fff');
        s.setProperty('--m-h', cfg.macro_height || '180px');
        s.setProperty('--m-fs', cfg.macro_text_size || '2rem');

        if(cfg.font_main) {
            document.getElementById('f-link').href = `https://fonts.googleapis.com/css2?family=${cfg.font_main.replace(/ /g, '+')}:wght@400;700;900&display=swap`;
            document.body.style.fontFamily = `'${cfg.font_main}', sans-serif`;
        }
    }

    function render() {
        const out = document.getElementById('view');
        out.innerHTML = '';
        const mode = (cfg.layout_mode || 'CATEGORIE').toUpperCase();

        if(mode === 'MACRO' && !st.m) {
            const macros = [...new Set(db.map(i => i.macro).filter(m => m))];
            let h = `<div class="${cfg.macro_layout === 'GRID' ? 'm-grid' : 'm-list'} ani">`;
            macros.forEach(m => {
                const img = db.find(i => i.macro === m && i.cat_foto_url)?.cat_foto_url || '';
                h += `<div class="m-card" onclick="setM('${m}')"><img src="${img}"><div class="m-ov"></div><span class="m-txt">${m}</span></div>`;
            });
            out.innerHTML = h + '</div>';
        } else if((mode === 'MACRO' && st.m && !st.c) || (mode !== 'MACRO' && !st.c)) {
            let filtered = st.m ? db.filter(i => i.macro === st.m) : db;
            const cats = [...new Set(filtered.map(i => i.categoria))];
            let h = st.m ? `<div class="nav-back" onclick="setM(null)">← Menu</div>` : '';
            h += `<div class="c-grid ani">`;
            cats.forEach(c => {
                const img = filtered.find(i => i.categoria === c && i.cat_foto_url)?.cat_foto_url || '';
                h += `<div class="c-card" onclick="setC('${c}')"><img src="${img}"><b>${c}</b></div>`;
            });
            out.innerHTML = h + '</div>';
        } else {
            let items = db.filter(i => i.categoria === st.c);
            let h = `<div class="nav-back" onclick="setC(null)">← Indietro</div><div class="ani">`;
            items.forEach(i => {
                let p = i.prezzo || '0';
                if(p.includes(':')) p = p.split(':')[0] + '.' + p.split(':')[1];
                h += `<div class="d-card">
                    ${i.foto_url && i.foto_url !== 'https://' ? `<img src="${i.foto_url}" class="d-img">` : ''}
                    <div style="flex:1">
                        <div class="d-name">${i.nome_it}</div>
                        <div class="d-desc">${i.desc_it || ''}</div>
                        <div class="d-price">${p}€</div>
                    </div>
                </div>`;
            });
            out.innerHTML = h + '</div>';
        }
    }

    window.setM = (v) => { st.m = v; render(); window.scrollTo(0,0); };
    window.setC = (v) => { st.c = v; render(); window.scrollTo(0,0); };
    window.home = () => { st.m = null; st.c = null; render(); };
    window.onscroll = () => document.getElementById('h-main').classList.toggle('h-blur', window.scrollY > 20);

    start();
</script>
</body>
</html>
