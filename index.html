<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Dynamic PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 id="app-title" class="text-xl font-bold text-blue-600">Caricamento...</h1>
            <div id="status-indicator" class="h-3 w-3 rounded-full bg-yellow-400"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p class="text-gray-500">Sincronizzazione dati in corso...</p>
        </div>

        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
            </div>
    </main>

    <script>
        // Configurazione: Recupera l'ID del foglio dall'URL (?id=IL_TUO_ID)
        const urlParams = new URLSearchParams(window.location.search);
        const sheetId = urlParams.get('id');
        const defaultSheetId = "IL_TUO_ID_DI_DEFAULT_QUI"; // Opzionale
        
        const finalId = sheetId || defaultSheetId;

        async function fetchSheetData() {
            if (!finalId) {
                document.getElementById('app-title').innerText = "Errore Configurazione";
                document.getElementById('loader').innerHTML = "<p class='text-red-500'>ID Foglio mancante nell'URL.</p>";
                return;
            }

            // Utilizziamo l'export CSV di Google per bypassare chiavi API complesse (se il foglio è 'Pubblicato sul Web')
            const url = `https://docs.google.com/spreadsheets/d/${finalId}/gviz/tq?tqx=out:csv`;

            try {
                const response = await fetch(url);
                const data = await response.text();
                processData(data);
            } catch (error) {
                console.error("Errore nel recupero dati:", error);
                document.getElementById('status-indicator').classList.replace('bg-yellow-400', 'bg-red-500');
            }
        }

        function processData(csvText) {
            // Semplice parser CSV (gestisce righe e virgole)
            const rows = csvText.split('\n').map(row => 
                row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/"/g, ''))
            );

            const headers = rows[0];
            const items = rows.slice(1);
            
            // Imposta Titolo App (assumendo che la prima riga/colonna sia il nome)
            document.getElementById('app-title').innerText = "Dashboard Attiva";
            
            const grid = document.getElementById('content-grid');
            grid.innerHTML = ''; // Pulisce

            items.forEach(item => {
                if(item[0]) { // Evita righe vuote
                    const card = `
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <h3 class="text-lg font-bold mb-2">${item[0]}</h3>
                            <p class="text-gray-600">${item[1] || ''}</p>
                            <span class="mt-4 inline-block text-sm font-medium text-blue-500">${item[2] || ''}</span>
                        </div>
                    `;
                    grid.innerHTML += card;
                }
            });

            // UI Update
            document.getElementById('loader').classList.add('hidden');
            grid.classList.remove('hidden');
            document.getElementById('status-indicator').classList.replace('bg-yellow-400', 'bg-green-500');
        }

        window.onload = fetchSheetData;
    </script>
</body>
</html>
