<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <title>Smart Menu Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root { --p: #000; --bg: #f8f9fa; --f-main: 'Montserrat', sans-serif; }
        body { margin:0; font-family: var(--f-main); background: var(--bg); color: #222; -webkit-font-smoothing: antialiased; }
        
        #loader { position:fixed; inset:0; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000; transition: 0.5s; }
        .spin { width:40px; height:40px; border:4px solid #eee; border-top:4px solid var(--p); border-radius:50%; animation: s 1s linear infinite; }
        @keyframes s { 100% { transform:rotate(360deg); } }

        header { padding: 25px 20px; text-align:center; position:sticky; top:0; z-index:100; background:rgba(255,255,255,0.9); backdrop-filter:blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        #logo-wrap img { max-height: 70px; width:auto; cursor:pointer; }
        #logo-wrap h1 { margin:0; font-size:1.8rem; text-transform:uppercase; cursor:pointer; }

        .container { padding:15px; max-width:600px; margin:auto; min-height: 80vh; }
        
        /* Layout Macro & Categorie */
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
        .list { display:flex; flex-direction:column; gap:12px; }

        .card-main { 
            height: 160px; border-radius: 18px; overflow:hidden; position:relative; cursor:pointer; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s ease;
        }
        .card-main:active { transform: scale(0.97); }
        .card-main img { width:100%; height:100%; object-fit:cover; }
        .card-main .ov { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.8) 10%, transparent 90%); }
        .card-main span { position:absolute; bottom:15px; left:0; right:0; color:#fff; font-weight:900; text-align:center; text-transform:uppercase; font-size:1.3rem; letter-spacing:1px; }

        /* Dish Card */
        .dish-card { background:#fff; border-radius:18px; padding:12px; display:flex; margin-bottom:12px; border:1px solid #f0f0f0; align-items:center; }
        .dish-img { width:75px; height:75px; object-fit:cover; border-radius:12px; margin-right:15px; }
        .dish-info { flex:1; }
        .dish-name { font-weight:800; font-size:1.05rem; color:#111; margin-bottom:3px; }
        .dish-desc { font-size:0.85rem; color:#666; line-height:1.3; }
        .dish-price { font-weight:900; color:var(--p); margin-top:6px; font-size:1.1rem; }

        .back-nav { display:inline-flex; align-items:center; padding:8px 18px; background:#000; color:#fff; border-radius:50px; margin-bottom:15px; cursor:pointer; font-size:11px; font-weight:bold; text-transform:uppercase; }
        
        .fade-in { animation: fadeIn 0.4s ease-in forwards; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>

<div id="loader"><div class="spin"></div><p id="l-msg" style="margin-top:15px; font-size:12px; font-weight:bold; text-transform:uppercase;">Inizializzazione Sistema...</p></div>

<header>
    <div id="logo-wrap"></div>
    <div id="subt" style="font-size:10px; opacity:0.6; margin-top:5px; font-weight:bold;"></div>
</header>

<div class="container">
    <div id="view" class="fade-in"></div>
</div>

<script src="app.js"></script>
<script>
    // Configurazione ID e Parametri
    const SID = new URLSearchParams(window.location.search).get('id');
    const LANG = navigator.language.split('-')[0].toLowerCase();
    let db = [], cfg = {}, state = { m: null, c: null };

    // Utility: Pulisce le chiavi dei dati (rimuove spazi e rende minuscolo)
    const clean = (s) => s ? s.toString().toLowerCase().trim().replace(/[^a-z0-9]/g, '') : '';

    // Parser CSV Avanzato (Gestisce virgole dentro le virgolette)
    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        return lines.map(line => {
            const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            return matches ? matches.map(m => m.replace(/^"|"$/g, '').trim()) : [];
        });
    }

    async function translate(text) {
        if (!text || LANG === 'it' || text.length < 2) return text;
        try {
            const res = await axios.get(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=it&tl=${LANG}&dt=t&q=${encodeURI(text)}`, { timeout: 3000 });
            return res.data[0][0][0];
        } catch (e) { return text; }
    }

    async function init() {
        if(!SID) { document.getElementById('l-msg').innerText = "ERRORE: ID FOGLIO MANCANTE"; return; }
        try {
            const [resC, resM] = await Promise.all([
                fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Config&v=${Date.now()}`),
                fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Menu&v=${Date.now()}`)
            ]);

            const csvC = parseCSV(await resC.text());
            const csvM = parseCSV(await resM.text());

            // Caricamento Config
            csvC.forEach(row => { if(row.length >= 2) cfg[clean(row[0])] = row[1]; });

            // Caricamento Menu
            const headers = csvM[0].map(h => clean(h));
            db = csvM.slice(1).map(row => {
                let obj = {};
                headers.forEach((h, i) => { obj[h] = row[i] || ''; });
                return obj;
            }).filter(i => clean(i.attivo) === 'si');

            // Traduzione Silenziosa
            if (LANG !== 'it') {
                document.getElementById('l-msg').innerText = "OTTIMIZZAZIONE LINGUA...";
                for (let i of db) {
                    i.nomeit = await translate(i.nomeit);
                    i.categoria = await translate(i.categoria);
                    i.macro = await translate(i.macro);
                }
            }

            render();
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        } catch (e) { 
            console.error(e);
            document.getElementById('l-msg').innerText = "ERRORE DI CONNESSIONE AL DATABASE";
        }
    }

    function render() {
        const out = document.getElementById('view');
        const lw = document.getElementById('logo-wrap');
        const st = document.getElementById('subt');
        
        // Header & Style
        lw.innerHTML = cfg.logotype === 'IMAGE' ? `<img src="${cfg.logourl}" onclick="nav(null,null)">` : `<h1 onclick="nav(null,null)">${cfg.logotext || 'MENU'}</h1>`;
        st.innerText = cfg.appsubtitle || '';
        document.documentElement.style.setProperty('--p', cfg.themeprimary || '#000');

        out.innerHTML = '';

        if (!state.m) {
            // LIVELLO 1: MACRO
            const macros = [...new Set(db.map(i => i.macro).filter(Boolean))];
            let html = `<div class="list">`;
            macros.forEach(m => {
                const img = cfg['macroimg' + clean(m)] || 'https://via.placeholder.com/600x300?text=' + m;
                html += `<div class="card-main fade-in" onclick="nav('${m}', null)"><img src="${img}"><div class="ov"></div><span>${m}</span></div>`;
            });
            out.innerHTML = html + '</div>';
        } else if (!state.c) {
            // LIVELLO 2: CATEGORIE
            const categories = [...new Set(db.filter(i => i.macro === state.m).map(i => i.categoria))];
            let html = `<div class="back-nav" onclick="nav(null,null)">← INDIETRO</div><div class="grid">`;
            categories.forEach(c => {
                const firstDish = db.find(i => i.categoria === c && i.fotourl) || {};
                const img = firstDish.fotourl || 'https://via.placeholder.com/300?text=' + c;
                html += `<div class="card-main fade-in" style="height:120px" onclick="nav('${state.m}', '${c}')"><img src="${img}"><div class="ov"></div><span style="font-size:1rem">${c}</span></div>`;
            });
            out.innerHTML = html + '</div>';
        } else {
            // LIVELLO 3: PIATTI
            const items = db.filter(i => i.macro === state.m && i.categoria === state.c);
            let html = `<div class="back-nav" onclick="nav('${state.m}',null)">← ${state.c}</div><div class="fade-in">`;
            items.forEach(i => {
                const price = parseFloat(i.prezzo) ? i.prezzo + '€' : '';
                html += `<div class="dish-card">
                    ${i.fotourl ? `<img src="${i.fotourl}" class="dish-img">` : ''}
                    <div class="dish-info">
                        <div class="dish-name">${i.nomeit}</div>
                        <div class="dish-desc">${i.descit || ''}</div>
                        <div class="dish-price">${price}</div>
                    </div>
                </div>`;
            });
            out.innerHTML = html + '</div>';
        }
    }

    window.nav = (m, c) => { state.m = m; state.c = c; window.scrollTo(0,0); render(); };
    init();
</script>
</body>
</html>
