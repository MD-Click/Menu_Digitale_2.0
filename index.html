<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PWA Menu - Professional Master</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link id="dynamic-fonts" rel="stylesheet">

    <style>
        :root { --accent: #f4fc03; --bg: #e8e8e8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; min-height: 100vh; background-attachment: fixed; transition: 0.3s; overflow-x: hidden; color: #333; }
        
        /* Loader: Solo Spinner, No Logo come richiesto */
        #master-loader { position: fixed; inset: 0; z-index: 10000; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(0,0,0,0.1); border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        header { padding: 20px 15px; text-align: center; position: sticky; top: 0; z-index: 900; background: inherit; }
        #app-subtitle { transition: 0.3s; }

        .nav-ui { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 10px auto; padding: 0 15px; }
        .back-btn { border: none; padding: 10px 20px; border-radius: 12px; font-weight: 900; cursor: pointer; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .view { display: none; padding: 15px; max-width: 800px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .list { display: flex; flex-direction: column; gap: 15px; }

        .clip-card { 
            border-radius: 20px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center; box-shadow: 0 8px 20px rgba(0,0,0,0.2); cursor: pointer; transition: 0.2s;
        }
        .clip-card:active { transform: scale(0.97); }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); }
        .clip-txt { position: relative; z-index: 2; font-weight: 900; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        .p-card { padding: 20px; border-radius: 25px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .p-img { width: 100%; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        #filter-bar { display: none; gap: 10px; justify-content: center; padding: 10px; overflow-x: auto; }
        .f-btn { padding: 8px 16px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }

        #btn-top { position: fixed; width: 50px; height: 50px; border-radius: 50%; border: none; display: none; align-items: center; justify-content: center; z-index: 1000; font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        .ar-btn { background: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 50px; font-size: 0.8rem; cursor: pointer; margin-top: 15px; display: inline-flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <div id="master-loader"><div class="spinner"></div></div>

    <header>
        <div id="app-logo"></div>
        <div id="app-subtitle"></div>
        <div class="nav-ui">
            <button id="btn-back" class="back-btn" onclick="goBack()">←</button>
            <div id="v-title" style="font-weight: 900; text-transform: uppercase;"></div>
            <div style="width:40px"></div>
        </div>
        <div id="filter-bar"></div>
    </header>

    <main>
        <div id="v-macro" class="view"></div>
        <div id="v-cat" class="view"></div>
        <div id="v-items" class="view"></div>
    </main>

    <button id="btn-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

<script>
    const params = new URLSearchParams(window.location.search);
    const SHEET_ID = params.get('id');
    const GID_MENU = "1832483838"; // Se cambi foglio, verifica questo ID

    let menuData = [], config = {}, state = { step: 'macro', m: null, c: null, filters: {} };

    // Helper per pulire i dati (God Mode)
    const clean = (str) => str ? str.toString().trim() : "";
    const isYes = (str) => {
        const s = clean(str).toUpperCase();
        return s === "SI" || s === "SÌ" || s === "Sì" || s === "YES";
    };

    async function init() {
        if(!SHEET_ID) { alert("Manca ID Foglio nell'URL!"); return; }
        
        const [cRaw, mRaw] = await Promise.all([fetchCSV(0), fetchCSV(GID_MENU)]);
        
        cRaw.forEach(r => config[clean(r.Parametro)] = clean(r.Valore));
        menuData = mRaw.map(row => {
            let newRow = {};
            Object.keys(row).forEach(k => newRow[clean(k)] = clean(row[k]));
            return newRow;
        });

        applyUI();
        
        // Decidi da dove partire (Layout_Mode)
        if(config.Layout_Mode === 'CATEGORIE') renderCat(true);
        else renderMacro();

        setTimeout(() => {
            document.getElementById('master-loader').style.display = 'none';
            setupPWA();
        }, parseInt(config.Loader_Time) || 2000);
    }

    async function fetchCSV(gid) {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}&t=${Date.now()}`;
        const res = await fetch(url);
        const text = await res.text();
        return new Promise(res => Papa.parse(text, {header:true, skipEmptyLines:true, complete: o => res(o.data)}));
    }

    function applyUI() {
        const body = document.body;
        const root = document.documentElement;
        
        // 1. Sfondo
        root.style.setProperty('--bg', config.App_Bg_Color);
        root.style.setProperty('--accent', config.Filter_Active_Color);
        if(config.App_Bg_Type === 'IMAGE' && config.App_Bg_Image) {
            body.style.backgroundImage = `url('${config.App_Bg_Image}')`;
            body.style.backgroundSize = config.App_Bg_Size;
            body.style.backgroundPosition = config.App_Bg_Pos;
        } else {
            body.style.backgroundColor = config.App_Bg_Color;
        }

        // 2. Font
        document.getElementById('dynamic-fonts').href = `https://fonts.googleapis.com/css2?family=${config.Font_Main.replace(/ /g,'+')}&family=${config.Subtitle_Font.replace(/ /g,'+')}&display=swap`;
        body.style.fontFamily = `'${config.Font_Main}', sans-serif`;

        // 3. Logo & Sottotitolo
        const logoHTML = (config.Logo_Type === 'IMAGE' && config.Logo_URL) 
            ? `<img src="${config.Logo_URL}" style="max-height:80px">`
            : `<h1 style="color:${config.Logo_Text_Color}; font-size:${config.Logo_Text_Size}; margin:0">${config.Logo_Text}</h1>`;
        document.getElementById('app-logo').innerHTML = logoHTML;

        const sub = document.getElementById('app-subtitle');
        sub.innerText = config.App_Subtitle;
        sub.style.cssText = `color:${config.Subtitle_Color}; font-family:'${config.Subtitle_Font}'; font-size:${config.Subtitle_Size}; text-align:${config.Subtitle_Align}; margin-top:${config.Subtitle_Margin};`;

        // 4. Torna Su (Posizionamento dinamico)
        const bTop = document.getElementById('btn-top');
        bTop.style.background = config.Btn_Top_Bg;
        bTop.style.color = config.Btn_Top_Simbol_Color;
        if(config.Btn_Top_Aling.includes('center')) bTop.style.left = 'calc(50% - 25px)';
        else bTop.style.right = '20px';
    }

    // --- LOGICA VISTE ---

    function renderMacro() {
        showV('v-macro');
        const macros = [...new Set(menuData.map(i => i.Macro))].filter(Boolean);
        const container = document.getElementById('v-macro');
        container.className = `view active ${config.Macro_Layout === 'GRID' ? 'grid' : 'list'}`;
        
        container.innerHTML = macros.map(m => {
            const img = m.toUpperCase().includes('BEV') ? config.Macro_Img_Bevande : config.Macro_Img_Cibo;
            return `
            <div class="clip-card" onclick="selM('${m}')" style="height:${config.Macro_Height}; background-image:url('${img}')">
                <div class="overlay"></div>
                <div class="clip-txt" style="color:${config.Macro_Text_Color}; font-size:${config.Macro_Text_Size}">${m}</div>
            </div>`;
        }).join('');
    }

    function selM(m) { state.m = m; state.step = 'cat'; renderCat(); }

    function renderCat(direct = false) {
        showV('v-cat');
        let filtered = direct ? menuData : menuData.filter(i => i.Macro === state.m);
        const cats = [...new Set(filtered.map(i => i.Categoria))];
        const container = document.getElementById('v-cat');
        container.className = `view active ${config.Cat_Layout === 'GRID' ? 'grid' : 'list'}`;

        container.innerHTML = cats.map(c => {
            const info = filtered.find(i => i.Categoria === c);
            const img = isYes(config.Cat_Img_Show) ? (info.Cat_Img || '') : '';
            return `
            <div class="clip-card" onclick="selC('${c}')" style="height:120px; background-image:url('${img}'); background-color:${config.Filter_Active_Color}">
                ${img ? '<div class="overlay"></div>' : ''}
                <div class="clip-txt" style="color:${config.Text_CatTitle_Color}">${c}</div>
            </div>`;
        }).join('');
    }

    function selC(c) { state.c = c; state.step = 'items'; renderItems(); }

    function renderItems() {
        showV('v-items');
        const catInfo = menuData.find(i => i.Categoria === state.c);
        const container = document.getElementById('v-items');
        container.className = `view active ${catInfo.Cat_Layout === 'GRID' ? 'grid' : 'list'}`;

        // Filtri Differenziati
        const fb = document.getElementById('filter-bar');
        fb.style.display = 'flex';
        const fSet = (state.m === 'CIBO' || !state.m) ? ['Senza Glutine', 'Vegano'] : ['Analcolico'];
        fb.innerHTML = fSet.map(f => `
            <button class="f-btn" onclick="togF('${f}')" style="background:${state.filters[f] ? config.Filter_Active_Color : '#ddd'}">${f}</button>
        `).join('');

        let items = menuData.filter(i => i.Categoria === state.c && isYes(i.Attivo));
        Object.keys(state.filters).forEach(f => { if(state.filters[f]) items = items.filter(i => isYes(i[f])); });

        container.innerHTML = items.map(i => `
            <div class="p-card" style="background:${config.Card_Bg}">
                ${i.Foto_URL ? `<img src="${i.Foto_URL}" class="p-img">` : ''}
                <div style="font-weight:900; color:${config.Card_Name_Color}; font-size:1.3rem">${i.Nome_IT}</div>
                <div style="font-size:0.9rem; color:${config.Card_Desc_Color}; margin:5px 0">${i.Desc_IT}</div>
                <div style="color:${config.Price_Color}; font-size:${config.Price_Size}; text-align:${config.Price_Align}; font-weight:900; margin-top:10px">€${i.Prezzo}</div>
                ${i.Modello_3d ? `<button class="ar-btn" onclick="window.open('${i.Modello_3d}')">📦 VEDI IN 3D (AR)</button>` : ''}
            </div>`).join('');
    }

    function togF(f) { state.filters[f] = !state.filters[f]; renderItems(); }

    function showV(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const back = document.getElementById('btn-back');
        const sub = document.getElementById('app-subtitle');
        if(id === 'v-macro') {
            back.style.display = 'none';
            sub.style.display = 'block';
            document.getElementById('v-title').innerText = '';
        } else {
            back.style.display = 'block';
            back.style.background = config.Btn_Back_Bg;
            back.style.color = config.Btn_Back_Text;
            sub.style.display = 'none';
            document.getElementById('v-title').innerText = id === 'v-cat' ? state.m : state.c;
        }
        document.getElementById('filter-bar').style.display = id === 'v-items' ? 'flex' : 'none';
        window.scrollTo(0,0);
    }

    function goBack() {
        if(state.step === 'items') { state.step = 'cat'; renderCat(); }
        else if(state.step === 'cat') { 
            if(config.Layout_Mode === 'CATEGORIE') return;
            state.step = 'macro'; renderMacro(); 
        }
    }

    window.onscroll = () => document.getElementById('btn-top').style.display = window.scrollY > 400 ? 'flex' : 'none';

    function setupPWA() {
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            setTimeout(() => {
                if(confirm("Vuoi salvare l'App sul tuo telefono per consultare il menu più velocemente?")) e.prompt();
            }, 3000);
        });
    }

    window.onload = init;
</script>
</body>
</html>
